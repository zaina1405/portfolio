  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ccent); margin:0 0 12px;\">{{ c.tagline }}<\u002Fp>\n            <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:1.6rem; letter-spacing:-0.02em; margin:0 0 14px; color:var(--text);\">{{ c.title }}<\u002Fh2>\n            <p style=\"margin:0 0 22px; font-size:0.95rem; line-height:1.6; color:var(--text3);\">{{ c.summary }}<\u002Fp>\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;\">\n              <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n                <sc-for list=\"{{ c.tags }}\" as=\"tag\" hint-placeholder-count=\"2\">\n                  <span style=\"font-family:'JetBrains Mono',monospace; border:1px solid rgba(var(--rgb),0.1); padding:4px 11px; border-radius:999px; color:var(--text3); font-size:0.7rem;\">{{ tag }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <span style=\"font-family:'Space Grotesk',sans-serif; font-size:0.82rem; color:var(--accent); white-space:nowrap;\">Read case study →<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- DETAIL VIEW -->\n    <sc-if value=\"{{ csDetailView }}\" hint-placeholder-val=\"{{ false }}\">\n      <button onclick=\"{{ closeCaseStudy }}\" style=\"background:none; border:none; cursor:pointer; padding:0; font-family:'Space Grotesk',sans-serif; font-size:0.86rem; color:var(--text3); display:inline-flex; align-items:center; gap:8px; margin-bottom:36px;\" style-hover=\"color:var(--text);\">← All case studies<\u002Fbutton>\n      <p style=\"font-family:'JetBrains Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); margin:0 0 14px;\">{{ activeCase.tagline }}<\u002Fp>\n      <h1 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(2.2rem,6vw,3.4rem); letter-spacing:-0.03em; margin:0 0 20px; color:var(--text);\">{{ activeCase.title }}<\u002Fh1>\n      <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:36px;\">\n        <sc-for list=\"{{ activeCase.tags }}\" as=\"tag\" hint-placeholder-count=\"2\">\n          <span style=\"font-family:'JetBrains Mono',monospace; border:1px solid rgba(var(--rgb),0.1); padding:4px 11px; border-radius:999px; color:var(--text3); font-size:0.7rem;\">{{ tag }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"border-radius:14px; overflow:hidden; border:1px solid rgba(var(--rgb),0.08); margin-bottom:40px;\">\n        <image-slot id=\"{{ activeCase.heroSlotId }}\" style=\"display:block; width:100%; height:560px;\" shape=\"rect\" placeholder=\"▶ drop cover image\"><\u002Fimage-slot>\n      <\u002Fdiv>\n      <p style=\"font-size:1.15rem; line-height:1.6; color:var(--text2); margin:0 0 48px; font-family:'Space Grotesk',sans-serif; font-weight:400;\">{{ activeCase.summary }}<\u002Fp>\n      <sc-if value=\"{{ activeCase.showBody }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <sc-for list=\"{{ activeCase.blocks }}\" as=\"b\" hint-placeholder-count=\"4\">\n            <sc-if value=\"{{ b.isHeading }}\" hint-placeholder-val=\"{{ false }}\">\n              <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:1.5rem; letter-spacing:-0.02em; color:var(--text); margin:40px 0 4px;\">{{ b.text }}<\u002Fh2>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ b.isText }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"font-size:1rem; line-height:1.75; color:var(--text3); margin:0 0 12px;\">{{ b.text }}<\u002Fp>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ b.isImage }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border-radius:14px; overflow:hidden; border:1px solid rgba(var(--rgb),0.08); margin:16px 0 24px;\">\n                <image-slot id=\"{{ b.slotId }}\" style=\"display:block; width:100%; height:360px;\" shape=\"rect\" placeholder=\"{{ b.label }}\"><\u002Fimage-slot>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ b.isVideo }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border-radius:14px; overflow:hidden; border:1px solid rgba(91,140,255,0.25); margin:16px 0 24px; position:relative; background:#000;\">\n                <image-slot id=\"{{ b.slotId }}\" style=\"display:block; width:100%; height:400px;\" shape=\"rect\" placeholder=\"{{ b.label }}\"><\u002Fimage-slot>\n                <span style=\"position:absolute; top:14px; left:14px; font-family:'JetBrains Mono',monospace; font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); background:rgba(8,8,10,0.7); backdrop-filter:blur(6px); padding:5px 11px; border-radius:999px; pointer-events:none;\">▶ Video<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ activeCase.inProgress }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"border:1px dashed rgba(var(--rgb),0.16); border-radius:14px; padding:56px 48px; text-align:center;\">\n          <p style=\"font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); margin:0 0 14px;\">Write-up in progress<\u002Fp>\n          <p style=\"font-family:'Space Grotesk',sans-serif; font-size:1.05rem; line-height:1.6; color:var(--text3); margin:0; max-width:420px; margin-left:auto; margin-right:auto;\">I'm still putting the full case study together — check back soon for the complete breakdown.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ================= EXPERIENCE ================= -->\n  <sc-if value=\"{{ isExperience }}\" hint-placeholder-val=\"{{ true }}\">\n  <section data-screen-label=\"Experience\" style=\"padding:140px 28px 120px; max-width:920px; margin:0 auto;\">\n    <p style=\"font-family:'JetBrains Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); margin:0 0 14px;\">Where I've worked<\u002Fp>\n    <h1 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(2.4rem,7vw,4rem); letter-spacing:-0.03em; margin:0 0 56px; color:var(--text);\">Relevant experience<\u002Fh1>\n    <div style=\"display:flex; flex-direction:column;\">\n      <sc-for list=\"{{ experiences }}\" as=\"e\" hint-placeholder-count=\"3\">\n        <div data-reveal=\"\" style=\"transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); display:grid; grid-template-columns:56px 1fr; gap:24px; padding:36px 0; border-top:1px solid rgba(var(--rgb),0.08);\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; gap:8px;\">\n            <image-slot id=\"{{ e.slotId }}\" style=\"display:block; width:56px; height:56px;\" shape=\"rounded\" radius=\"12\" placeholder=\"logo\"><\u002Fimage-slot>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--faint);\">{{ e.index }}<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:6px;\">\n              <h3 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:1.3rem; letter-spacing:-0.01em; margin:0; color:var(--text);\">{{ e.role }}<\u002Fh3>\n              <span style=\"font-family:'JetBrains Mono',monospace; font-size:0.62rem; padding:3px 9px; border-radius:999px; {{ e.typeStyle }}\">{{ e.type }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family:'JetBrains Mono',monospace; color:var(--text4); margin:0 0 18px; font-size:0.76rem;\">{{ e.org }} · {{ e.period }}<\u002Fp>\n            <ul style=\"margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:10px;\">\n              <sc-for list=\"{{ e.bullets }}\" as=\"b\" hint-placeholder-count=\"3\">\n                <li style=\"display:flex; gap:12px; color:var(--text3); font-size:0.9rem; line-height:1.5;\"><span style=\"color:var(--accent); flex-shrink:0;\">→<\u002Fspan>{{ b }}<\u002Fli>\n              <\u002Fsc-for>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ================= SKILLS ================= -->\n  <sc-if value=\"{{ isSkills }}\" hint-placeholder-val=\"{{ true }}\">\n  <section data-screen-label=\"Skills\" style=\"padding:140px 0 120px;\">\n    <div style=\"max-width:1120px; margin:0 auto; padding:0 28px;\">\n      <p style=\"font-family:'JetBrains Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); margin:0 0 14px;\">Toolbox<\u002Fp>\n      <h1 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(2.4rem,7vw,4rem); letter-spacing:-0.03em; margin:0 0 48px; color:var(--text);\">Skills<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column; gap:14px; margin-bottom:72px;\">\n      <div class=\"marq\" style=\"overflow:hidden; -webkit-mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent); mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);\">\n        <div class=\"marq-t\" style=\"display:flex; gap:14px; width:max-content; animation:scrollLeft 38s linear infinite;\">\n          <sc-for list=\"{{ marqueeA }}\" as=\"m\" hint-placeholder-count=\"14\">\n            <span style=\"font-family:'JetBrains Mono',monospace; border:1px solid rgba(var(--rgb),0.09); padding:10px 18px; border-radius:10px; color:var(--text2); font-size:0.84rem; white-space:nowrap;\">{{ m }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"marq\" style=\"overflow:hidden; -webkit-mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent); mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);\">\n        <div class=\"marq-t\" style=\"display:flex; gap:14px; width:max-content; animation:scrollRight 46s linear infinite;\">\n          <sc-for list=\"{{ marqueeB }}\" as=\"m\" hint-placeholder-count=\"14\">\n            <span style=\"font-family:'JetBrains Mono',monospace; border:1px solid rgba(var(--rgb),0.09); padding:10px 18px; border-radius:10px; color:var(--text2); font-size:0.84rem; white-space:nowrap;\">{{ m }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1120px; margin:0 auto; padding:0 28px; display:grid; grid-template-columns:1fr 1fr; gap:24px;\">\n      <sc-for list=\"{{ skills }}\" as=\"cat\" hint-placeholder-count=\"4\">\n        <div data-reveal=\"\" style=\"transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); border:1px solid rgba(var(--rgb),0.08); border-radius:14px; padding:26px; background:var(--panel);\">\n          <p style=\"font-family:'JetBrains Mono',monospace; font-size:0.72rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--accent); margin:0 0 18px;\">{{ cat.label }}<\u002Fp>\n          <div style=\"display:flex; gap:9px; flex-wrap:wrap;\">\n            <sc-for list=\"{{ cat.items }}\" as=\"item\" hint-placeholder-count=\"5\">\n              <span style=\"border:1px solid rgba(var(--rgb),0.1); padding:6px 13px; border-radius:999px; color:var(--text2); font-size:0.82rem;\">{{ item.name }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ================= ABOUT ================= -->\n  <sc-if value=\"{{ isAbout }}\" hint-placeholder-val=\"{{ true }}\">\n  <section data-screen-label=\"About\" style=\"padding:140px 28px 120px; max-width:900px; margin:0 auto;\">\n    <p style=\"font-family:'JetBrains Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); margin:0 0 14px;\">Who I am<\u002Fp>\n    <h1 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(2.4rem,7vw,4rem); letter-spacing:-0.03em; margin:0 0 48px; color:var(--text);\">About<\u002Fh1>\n    <div data-reveal=\"\" style=\"transition:opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); display:grid; grid-template-columns:1fr 300px; gap:48px; align-items:start; margin-bottom:48px;\">\n      <div>\n        <p style=\"font-family:'Space Grotesk',sans-serif; font-weight:400; font-size:clamp(1.05rem,2.2vw,1.4rem); line-height:1.6; letter-spacing:-0.01em; color:var(--text2); margin:0;\">Hey, my name is Zain. I'm passionate about engineering. Ever since I was little, I've been obsessed with robots, engines, automation, basically anything that moved. I'd take things apart just to see how they worked, not always successfully putting them back together. That curiosity has stuck with me, and these days I've finally gotten the opportunity to actually build the things I used to dream about.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:relative;\">\n        <image-slot id=\"about-headshot\" style=\"display:block; width:100%; height:360px;\" shape=\"rounded\" radius=\"16\" placeholder=\"Drop a headshot\"><\u002Fimage-slot>\n        <span style=\"position:absolute; bottom:14px; left:14px; font-family:'JetBrains Mono',monospace; font-size:0.64rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--text2); background:rgba(var(--bg-rgb),0.6); backdrop-filter:blur(6px); padding:5px 10px; border-radius:999px; pointer-events:none;\">Zain Ali<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"transition:opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(var(--rgb),0.08); border:1px solid rgba(var(--rgb),0.08); border-radius:14px; overflow:hidden;\">\n      <sc-for list=\"{{ facts }}\" as=\"f\" hint-placeholder-count=\"6\">\n        <div style=\"background:var(--panel); padding:22px 24px;\">\n          <p style=\"font-family:'JetBrains Mono',monospace; font-size:0.66rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--text4); margin:0 0 7px;\">{{ f.key }}<\u002Fp>\n          <p style=\"margin:0; font-size:0.95rem; color:var(--text);\">{{ f.value }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ================= CONTACT ================= -->\n  <sc-if value=\"{{ isContact }}\" hint-placeholder-val=\"{{ true }}\">\n  <section data-screen-label=\"Contact\" style=\"padding:140px 28px 120px; max-width:1000px; margin:0 auto;\">\n    <p style=\"font-family:'JetBrains Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); margin:0 0 14px;\">Say hello<\u002Fp>\n    <h1 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(2.4rem,7vw,4rem); letter-spacing:-0.03em; margin:0 0 48px; color:var(--text);\">Get in touch<\u002Fh1>\n    <div style=\"max-width:560px;\">\n      <div>\n        <p style=\"font-size:1rem; line-height:1.65; color:var(--text3); margin:0 0 32px;\">Always willing to talk hardware, projects, or engineering in general. Reach out if you have any questions, want to collaborate, or just chat.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:16px;\">\n          <a href=\"mailto:zain.salman@hotmail.com\" style=\"display:flex; align-items:center; gap:12px; color:var(--text2); font-size:0.92rem;\" style-hover=\"color:var(--accent);\"><span style=\"color:var(--accent);\">✉<\u002Fspan> zain.salman@hotmail.com <span style=\"font-family:'JetBrains Mono',monospace; font-size:0.62rem; color:var(--accent); border:1px solid rgba(91,140,255,0.4); padding:1px 7px; border-radius:999px;\">preferred<\u002Fspan><\u002Fa>\n          <a href=\"mailto:Zain.ali.syed124@gmail.com\" style=\"display:flex; align-items:center; gap:12px; color:var(--text2); font-size:0.92rem;\" style-hover=\"color:var(--accent);\"><span style=\"color:var(--accent);\">✉<\u002Fspan> Zain.ali.syed124@gmail.com<\u002Fa>\n          <div style=\"display:flex; align-items:center; gap:12px; color:var(--text2); font-size:0.92rem;\"><span style=\"color:var(--accent);\">⚲<\u002Fspan> Toronto, ON<\u002Fdiv>\n          <div style=\"display:flex; gap:20px; margin-top:8px;\">\n            <a href=\"https://github.com/zaina1405\" target=\"_blank\" style=\"font-family:'JetBrains Mono',monospace; color:var(--text4); font-size:0.8rem;\" style-hover=\"color:var(--text);\">github ↗<\u002Fa>\n            <a href=\"https://www.linkedin.com/in/zain-ali822/\" target=\"_blank\" style=\"font-family:'JetBrains Mono',monospace; color:var(--text4); font-size:0.8rem;\" style-hover=\"color:var(--text);\">linkedin ↗<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- FOOTER -->\n  <footer style=\"position:relative; z-index:5; background:var(--bg); border-top:1px solid rgba(var(--rgb),0.06); padding:36px 28px;\">\n    <div style=\"max-width:1120px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;\">\n      <p style=\"font-family:'JetBrains Mono',monospace; color:var(--faint); font-size:0.72rem; margin:0;\">© 2026 Zain Ali<\u002Fp>\n      <p style=\"font-family:'JetBrains Mono',monospace; color:var(--faint); font-size:0.72rem; margin:0; display:flex; align-items:center; gap:7px;\"><span style=\"color:#00d9a3;\">●<\u002Fspan> Actively maintained · Updated June 2026<\u002Fp>\n      <p style=\"font-family:'JetBrains Mono',monospace; color:var(--faint); font-size:0.72rem; margin:0;\">Toronto, ON · <span data-clock=\"\" style=\"color:var(--text3);\">--:--:-- EST<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- PROJECT MODAL -->\n  <sc-if value=\"{{ activeProject.open }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeProject }}\" style=\"position:fixed; inset:0; z-index:200; background:rgba(8,8,10,0.74); backdrop-filter:blur(8px); display:flex; align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto;\">\n      <div onclick=\"{{ stopProp }}\" style=\"max-width:760px; width:100%; margin:auto; background:var(--bg); border:1px solid rgba(var(--rgb),0.12); border-radius:18px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,0.5);\">\n        <div style=\"position:relative; border-bottom:1px solid rgba(var(--rgb),0.07);\">\n          <image-slot id=\"{{ activeProject.slotId }}\" style=\"display:block; width:100%; height:420px;\" shape=\"rect\" placeholder=\"▶ drop preview\"><\u002Fimage-slot>\n          <button onclick=\"{{ closeProject }}\" title=\"Close\" style=\"position:absolute; top:16px; right:16px; width:38px; height:38px; border-radius:999px; border:none; background:rgba(8,8,10,0.6); backdrop-filter:blur(6px); color:#fff; cursor:pointer; font-size:1rem; line-height:1;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:40px;\">\n          <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:2rem; letter-spacing:-0.02em; margin:0 0 18px; color:var(--text);\">{{ activeProject.title }}<\u002Fh2>\n          <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:26px;\">\n            <sc-for list=\"{{ activeProject.tags }}\" as=\"tag\" hint-placeholder-count=\"3\">\n              <span style=\"font-family:'JetBrains Mono',monospace; border:1px solid rgba(var(--rgb),0.1); padding:4px 11px; border-radius:999px; color:var(--text3); font-size:0.7rem;\">{{ tag }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <p style=\"font-size:1.02rem; line-height:1.75; color:var(--text2); margin:0 0 24px; font-family:'Space Grotesk',sans-serif; font-weight:400; white-space:pre-wrap;\">{{ activeProject.longDescription }}<\u002Fp>\n          <sc-if value=\"{{ activeProject.credit }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"margin:0 0 24px; font-family:'JetBrains Mono',monospace; font-size:0.72rem; line-height:1.5; color:var(--text4);\">// {{ activeProject.credit }}<\u002Fp>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ activeProject.hasLinks }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; gap:12px; flex-wrap:wrap; padding-top:8px; border-top:1px solid rgba(var(--rgb),0.07); margin-top:4px;\">\n              <sc-for list=\"{{ activeProject.links }}\" as=\"lnk\" hint-placeholder-count=\"1\">\n                <a href=\"{{ lnk.url }}\" target=\"_blank\" style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:0.86rem; color:var(--text); background:var(--panel); border:1px solid rgba(var(--rgb),0.12); padding:10px 18px; border-radius:999px; display:inline-flex; align-items:center; gap:7px; margin-top:20px;\" style-hover=\"border-color:var(--accent); color:var(--accent);\">{{ lnk.label }} ↗<\u002Fa>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { view: 'home', activeExp: 0, sent: false, theme: this.readTheme(), openCase: null, openProject: null };\n\n  readTheme() {\n    try { return localStorage.getItem('za-theme') || 'dark'; } catch (e) { return 'dark'; }\n  }\n  toggleTheme = () => {\n    const theme = this.state.theme === 'dark' ? 'light' : 'dark';\n    try { localStorage.setItem('za-theme', theme); } catch (e) {}\n    this.setState({ theme });\n  };\n\n  setView(v) {\n    this.setState({ view: v, openCase: null });\n    if (typeof window !== 'undefined') window.scrollTo(0, 0);\n  }\n  openCaseStudy(i) {\n    this.setState({ openCase: i });\n    if (typeof window !== 'undefined') window.scrollTo(0, 0);\n  }\n  closeCaseStudy = () => {\n    this.setState({ openCase: null });\n    if (typeof window !== 'undefined') window.scrollTo(0, 0);\n  };\n  openProject = (i) => {\n    this.setState({ openProject: i });\n  };\n  closeProject = () => {\n    this.setState({ openProject: null });\n  };\n\n  experiences = [\n    { role: 'Team Captain', org: 'Northview Robotics — FRC Team 6632', period: 'Oct 2024 – Jun 2026', type: 'robotics team',\n      bullets: [\n        'One of two Team Captains of Team 6632 Northview Robotics.',\n        'Assisted in the design, assembly, manufacturing, and programming of the competition robot, which qualified for the FIRST Ontario Provincial Championship.',\n        'Organized team meetings and mentored new members in technical skills such as CAD, fabrication, and electrical.',\n        'Responsible for all of the purchasing, managing a team budget of over $35k.',\n        'Contributed to the development of team branding, documentation, and presentation materials for sponsorship and outreach.',\n        'Contributed to the team winning its first-ever Excellence in Engineering Award and Finalist Award.',\n      ] },\n    { role: 'Team Captain', org: 'Northview Robotics — FTC Team 22150', period: 'Sep 2025 – Mar 2026', type: 'robotics team',\n      bullets: [\n        'Served as one of the captains of a small-member FTC Team 22150.',\n        'Co-founded FTC Team 22150 alongside three other members for the FIRST Tech Challenge.',\n        'Contributed to the design, assembly, and programming of the competition robot, which earned the Design Award (second place) at the Central Toronto Qualifier Competition.',\n        'Utilized 3D printing to rapidly prototype and iterate robot components.',\n        'Assisted with budgeting and ordering of team materials and components.',\n      ] },\n    { role: 'Engineering Exec', org: 'Steam ICAC', period: 'Oct 2025 – Jun 2026', type: 'school club',\n      bullets: [\n        'Assisted 5+ groups in the development of their projects.',\n        'Used CAD and 3D printing to create working prototypes to solve real-life problems.',\n        'Contributed to teams that won first overall and third overall.',\n      ] },\n  ];\n\n  typeColor = {\n    'internship': 'color:var(--accent); border:1px solid rgba(91,140,255,0.4);',\n    'design team': 'color:#00d9a3; border:1px solid rgba(0,217,163,0.4);',\n    'robotics team': 'color:#00d9a3; border:1px solid rgba(0,217,163,0.4);',\n    'academic': 'color:#c08bff; border:1px solid rgba(192,139,255,0.4);',\n    'school club': 'color:#f5a623; border:1px solid rgba(245,166,35,0.4);',\n    'placeholder': 'color:var(--faint); border:1px solid rgba(var(--rgb),0.2);',\n  };\n\n  projects = [\n    { title: 'Custom Macropad', description: 'A custom macropad (keyboard) that I designed on a 2-layer PCB with a custom 3D-printed case.', longDescription: 'A custom macropad (keyboard) that I designed on a 2-layer PCB with a custom 3D-printed case. [Write a longer description here — the why, the build process, the components, and what you learned.]', tags: ['KiCad','3D Printing','Firmware'], github: 'https://github.com/zaina1405/Macropad', links: [{ label: 'GitHub', url: 'https://github.com/zaina1405/Macropad' }] },\n    { title: 'FRC Rebuilt 2026 Scouting App', description: 'A scouting app to track other robots\\u2019 performance during matches to inform alliance selection.', credit: 'Built with luidevo.', tags: ['HTML','Scouting','FRC'], github: 'https://github.com/LUIDevo/scouting-app-2026', links: [{ label: 'GitHub', url: 'https://github.com/LUIDevo/scouting-app-2026' }] },\n    { title: 'Maze Solving Robot', description: 'An autonomous maze-solving robot that won first place at the UofT RSX SEEK hackathon.', longDescription: 'A maze-solving robot that competed in the UofT RSX SEEK hackathon, winning first place. The robot used ultrasonic and infrared sensors to navigate through mazes autonomously. It also featured modified wheels and a “sled system” to traverse over rough terrain.', tags: ['Robotics','Autonomous','Sensors'], github: '#' },\n    { title: 'Smarter Scouting App', description: 'Another FRC scouting app with smart features, a built-in AI assistant powered by the Gemini API, and an alliance builder.', credit: 'Built with luidevo.', tags: ['AI','Scouting','FRC'], github: 'https://github.com/LUIDevo/frc-graphql-app', links: [{ label: 'GitHub', url: 'https://github.com/LUIDevo/frc-graphql-app' }] },\n    { title: 'Smart Organization Dashboard', description: 'A desktop dashboard containing a to-do list, your calendar, and other features.', tags: [], github: '#', comingSoon: true },\n    { title: 'Coming soon', description: 'A new project is in the works — details coming soon.', tags: [], github: '#', comingSoon: true },\n  ];\n\n  caseStudies = [\n    { title: 'Paperweight — FRC Robot', tagline: 'FRC · 2025–2026', slotId: 'cs-0', summary: 'Team 6632\\u2019s FRC robot for the 2025–2026 Rebuilt season.', tags: ['FRC','Team 6632','Rebuilt'],\n      blocks: [\n        { type: 'heading', text: 'Overview' },\n        { type: 'text', text: 'Write a short intro to Paperweight here — what the robot had to do this season and the headline result.' },\n        { type: 'image', label: '▶ drop a full-robot photo' },\n        { type: 'heading', text: 'The Game' },\n        { type: 'text', text: 'Describe the Rebuilt game objectives and how your strategy shaped the design.' },\n        { type: 'heading', text: 'Design & Build' },\n        { type: 'text', text: 'Walk through the overall architecture — drivetrain, frame, and major decisions.' },\n        { type: 'text', text: 'Add a second paragraph on materials, fabrication, and iterations.' },\n        { type: 'image', label: '▶ drop a CAD or build photo' },\n        { type: 'video', label: '▶ drop a match / reveal video thumbnail' },\n        { type: 'heading', text: 'Subsystems' },\n        { type: 'text', text: 'Detail the key subsystems you worked on — intake, scoring, climb, etc.' },\n        { type: 'text', text: 'Explain any tricky mechanical or electrical problems and how you solved them.' },\n        { type: 'image', label: '▶ drop a subsystem close-up' },\n        { type: 'heading', text: 'My Role' },\n        { type: 'text', text: 'Describe specifically what you contributed to Paperweight.' },\n        { type: 'heading', text: 'Competition' },\n        { type: 'text', text: 'How did the robot perform at events? Awards, rankings, lessons learned.' },\n        { type: 'video', label: '▶ drop a competition highlight video thumbnail' },\n        { type: 'heading', text: 'Reflection' },\n        { type: 'text', text: 'What worked, what you would change, and what you took away from the season.' },\n      ] },\n    { title: 'Ornamental — FTC Robot', tagline: 'FTC · 2025', slotId: 'cs-1', summary: 'Team 22150\\u2019s FTC robot for the 2025 FTC season, DECODE.', tags: ['FTC','Team 22150','DECODE'],\n      blocks: [\n        { type: 'heading', text: 'Overview' },\n        { type: 'text', text: 'Intro to Ornamental — the DECODE season and what the robot needed to accomplish.' },\n        { type: 'image', label: '▶ drop a full-robot photo' },\n        { type: 'heading', text: 'Design & Build' },\n        { type: 'text', text: 'Walk through the design approach and key build decisions.' },\n        { type: 'image', label: '▶ drop a build or CAD photo' },\n        { type: 'heading', text: 'My Role' },\n        { type: 'text', text: 'Describe what you contributed to Ornamental.' },\n        { type: 'heading', text: 'Reflection' },\n        { type: 'text', text: 'Results, lessons, and what you would improve next season.' },\n      ] },\n    { title: 'Project in progress', tagline: 'Coming soon', slotId: 'cs-2', summary: 'A new case study is in the works — details coming soon.', tags: ['TBD'], blocks: [] },\n  ];\n\n  skillCats = [\n    { label: 'CAD & Design', items: [{ name: 'Onshape' }, { name: 'Fusion 360' }, { name: 'SolidWorks' }, { name: 'AutoCAD' }] },\n    { label: 'Languages', items: [{ name: 'Python' }, { name: 'Java' }, { name: 'C++' }] },\n    { label: 'Hardware', items: [{ name: '3D Printing' }, { name: 'KiCad' }, { name: 'Soldering' }, { name: 'Arduino' }, { name: 'ESP32' }] },\n    { label: 'Manufacturing', items: [{ name: '3D Printing' }, { name: 'CAM / CNC' }, { name: 'Lathe' }, { name: 'Mill' }, { name: 'Laser Cutting' }, { name: 'MIG Welding' }, { name: 'General Tools' }] },\n    { label: 'Tools', items: [{ name: 'Git' }, { name: 'GitHub' }, { name: 'Docker' }, { name: 'Linux / Bash' }, { name: 'Claude Code' }] },\n    { label: 'Software & Productivity', items: [{ name: 'Google Workspace' }, { name: 'Microsoft 365' }, { name: 'Excel / Sheets' }, { name: 'PowerPoint / Slides' }, { name: 'Canva' }] },\n  ];\n\n  softSkills = ['Teamwork', 'Leadership', 'Communication', 'Problem Solving', 'Project Management', 'Public Speaking', 'Adaptability', 'Time Management'];\n\n  facts = [\n    { key: 'School', value: 'Lassonde School of Engineering' },\n    { key: 'Focus', value: 'Robotics · Hardware · Mechanical · Automation' },\n    { key: 'Based in', value: 'Toronto, ON' },\n    { key: 'Goal', value: 'Land an engineering role in my focus areas' },\n  ];\n\n  stats = [\n    { target: 6, pad: '1', suffix: '', start: '00', label: 'Projects built' },\n    { target: 3, pad: '1', suffix: '', start: '00', label: 'Roles & teams' },\n    { target: 18, pad: '0', suffix: '+', start: '0', label: 'Technologies' },\n  ];\n\n  componentDidMount() {\n    this._mounted = true;\n    this.startClock();\n    requestAnimationFrame(() => this.initFx());\n  }\n  componentWillUnmount() { this._mounted = false; this.cleanupFx(); if (this._clock) clearInterval(this._clock); }\n\n  startClock() {\n    const tick = () => {\n      const el = document.querySelector('[data-clock]');\n      if (!el) return;\n      const t = new Date().toLocaleTimeString('en-US', { timeZone: 'America/Toronto', hour12: false });\n      el.textContent = t + ' EST';\n    };\n    tick();\n    if (this._clock) clearInterval(this._clock);\n    this._clock = setInterval(tick, 1000);\n  }\n  componentDidUpdate(prevProps, prevState) {\n    if (prevState.view !== this.state.view) {\n      requestAnimationFrame(() => this.initFx());\n    }\n  }\n\n  cleanupFx() {\n    if (this._io) this._io.disconnect();\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n\n  initFx() {\n    if (!this._mounted) return;\n    this.cleanupFx();\n\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          const el = e.target;\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n          el.querySelectorAll && el.querySelectorAll('[data-counter]').forEach((c) => this.runCounter(c));\n          if (el.hasAttribute('data-counter')) this.runCounter(el);\n          this._io.unobserve(el);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n\n    document.querySelectorAll('[data-reveal]').forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(28px)';\n      this._io.observe(el);\n    });\n\n    this._onScroll = () => {\n      if (this._raf) return;\n      this._raf = requestAnimationFrame(() => {\n        this._raf = null;\n        const vh = window.innerHeight;\n        const sy = window.scrollY;\n        const hero = document.querySelector('[data-hero-inner]');\n        if (hero) {\n          const p = Math.min(sy / (vh * 0.62), 1);\n          hero.style.transform = `scale(${1 - p * 0.07})`;\n          hero.style.opacity = `${Math.max(1 - p * 1.18, 0)}`;\n        }\n        document.querySelectorAll('[data-parallax]').forEach((el) => {\n          const frame = el.parentElement;\n          if (!frame) return;\n          const r = frame.getBoundingClientRect();\n          const prog = (r.top + r.height / 2 - vh / 2) / vh;\n          el.style.transform = `translateY(${prog * -28}px)`;\n        });\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  runCounter(el) {\n    if (el._counted) return;\n    el._counted = true;\n    const target = parseFloat(el.getAttribute('data-target')) || 0;\n    const suffix = el.getAttribute('data-suffix') || '';\n    const pad = el.getAttribute('data-pad') === '1';\n    const dur = 1300;\n    const t0 = performance.now();\n    const step = (t) => {\n      const p = Math.min((t - t0) / dur, 1);\n      const e = 1 - Math.pow(1 - p, 3);\n      const v = Math.round(target * e);\n      el.textContent = (pad ? String(v).padStart(2, '0') : String(v)) + suffix;\n      if (p < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }\n\n  renderVals() {\n    const view = this.state.view;\n    const navDefs = [\n      { id: 'about', label: 'About' },\n      { id: 'experience', label: 'Experience' },\n      { id: 'skills', label: 'Skills' },\n      { id: 'work', label: 'Projects' },\n      { id: 'casestudies', label: 'Case Studies' },\n      { id: 'contact', label: 'Contact' },\n    ];\n    const navItems = navDefs.map((n) => ({\n      label: n.label,\n      go: () => this.setView(n.id),\n      style: `background:none; border:none; cursor:pointer; padding:0; font-family:'Manrope',sans-serif; font-size:0.86rem; font-weight:500; transition:color .2s; color:${view === n.id ? 'var(--text)' : 'var(--text3)'};`,\n    }));\n\n    const projects = this.projects.map((p, i) => ({\n      ...p,\n      slotId: 'proj-' + i,\n      isLive: !p.comingSoon,\n      open: p.comingSoon ? (() => {}) : (() => this.openProject(i)),\n      cardStyle: `transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); border:1px solid rgba(var(--rgb),0.08); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; background:var(--panel);${p.comingSoon ? ' opacity:0.62;' : ' cursor:pointer;'}`,\n      index: String(i + 1).padStart(2, '0'),\n      count: String(this.projects.length).padStart(2, '0'),\n    }));\n\n    const spotlight = this.projects[0];\n\n    const experiences = this.experiences.map((e, i) => ({\n      ...e,\n      index: String(i + 1).padStart(2, '0'),\n      slotId: 'exp-' + i,\n      typeStyle: this.typeColor[e.type] || 'color:var(--text3); border:1px solid rgba(var(--rgb),0.2);',\n    }));\n\n    const allSkills = [...this.skillCats.flatMap((c) => c.items.map((i) => i.name)), ...this.softSkills];\n    const half = Math.ceil(allSkills.length / 2);\n    const rowA = allSkills.slice(0, half);\n    const rowB = allSkills.slice(half);\n\n    return {\n      navItems,\n      theme: this.state.theme,\n      toggleTheme: this.toggleTheme,\n      themeIcon: this.state.theme === 'dark' ? '☾' : '☀',\n      closeProject: this.closeProject,\n      stopProp: (e) => e.stopPropagation(),\n      activeProject: (() => {\n        const idx = this.state.openProject;\n        if (idx == null) return { open: false, title: '', longDescription: '', tags: [], links: [], hasLinks: false, slotId: 'proj-x', credit: '' };\n        const p = this.projects[idx];\n        if (!p) return { open: false, title: '', longDescription: '', tags: [], links: [], hasLinks: false, slotId: 'proj-x', credit: '' };\n        const links = p.links || [];\n        return { open: true, title: p.title, longDescription: p.longDescription || p.description, tags: p.tags || [], links, hasLinks: links.length > 0, slotId: 'proj-' + idx, credit: p.credit || '' };\n      })(),\n      resumeUrl: (typeof window !== 'undefined' && window.__resources && window.__resources.resumePdf) || 'uploads/Zain_Ali_Resume.pdf',\n      goHome: () => this.setView('home'),\n      goWork: () => this.setView('work'),\n      goContact: () => this.setView('contact'),\n      isHome: view === 'home',\n      isWork: view === 'work',\n      isCaseStudies: view === 'casestudies',\n      caseStudies: this.caseStudies.map((c, i) => ({ ...c, open: () => this.openCaseStudy(i) })),\n      csListView: view === 'casestudies' && this.state.openCase === null,\n      csDetailView: view === 'casestudies' && this.state.openCase !== null,\n      closeCaseStudy: this.closeCaseStudy,\n      activeCase: (() => {\n        const c = this.caseStudies[this.state.openCase];\n        if (!c) return { tagline: '', title: '', tags: [], summary: '', blocks: [], heroSlotId: 'cs-hero-0', hasBody: false, showBody: false, inProgress: false, empty: true };\n        const raw = Array.isArray(c.blocks) ? c.blocks : [];\n        const hasBody = raw.length > 0;\n        const blocks = raw.map((b, i) => ({\n          text: b.text || '',\n          label: b.label || '▶ drop media',\n          slotId: c.slotId + '-b' + i,\n          isHeading: b.type === 'heading',\n          isText: b.type === 'text',\n          isImage: b.type === 'image',\n          isVideo: b.type === 'video',\n        }));\n        // Flip a case study's `writeupReady: true` (in the caseStudies array) when its\n        // full write-up is ready. Until then visitors see a clean \"in progress\" card\n        // instead of the placeholder blocks — which stay in the data for easy editing.\n        const writeupReady = c.writeupReady === true;\n        return { ...c, blocks, heroSlotId: c.slotId + '-hero', hasBody, showBody: writeupReady && hasBody, inProgress: !writeupReady, empty: writeupReady && !hasBody };\n      })(),\n      isExperience: view === 'experience',\n      isSkills: view === 'skills',\n      isAbout: view === 'about',\n      isContact: view === 'contact',\n      stats: this.stats,\n      spotlight,\n      projects,\n      experiences,\n      skills: this.skillCats,\n      facts: this.facts,\n      marqueeA: [...rowA, ...rowA],\n      marqueeB: [...rowB, ...rowB],\n\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
